ollama:
  base_url: "http://localhost:11434"
  ocr_model: "glm-ocr"
  llm_model: "qwen2.5:7b"              # 日常默认 LLM（4.7GB，直接流式输出，无 thinking 延迟）
  llm_model_enhanced: "qwen3:8b"       # 增强模式，手动切换（5.2GB，含 thinking，适合非流式复杂查询）

embedding:
  model: "Qwen/Qwen3-Embedding-0.6B" # 600M 参数，中文优化，内存友好
  batch_size: 32
  device: "cpu"                       # CPU：避免 PyTorch MPS Metal shader 大量编译占用统一内存

ingest:
  parse_workers: 2
  microbatch_max_files: 8
  microbatch_max_chunks: 128
  microbatch_linger_ms: 75
  adaptive_batch_char_budget: 32768
  adaptive_batch_max: 64
  embedding_cache: true

reranker:
  model: "Qwen/Qwen3-Reranker-0.6B"  # 600M 参数，生成式精排
  instruction: "Given a search query, retrieve relevant text passages that answer the query."
  # runtime: mlx-lm (Apple Silicon MLX，比 PyTorch MPS 快 ~200x)

qdrant:
  host: "localhost"
  port: 6333
  collection: "docflow"

chunking:
  chunk_size: 512        # tokens
  chunk_overlap: 51      # ~10%
  ocr_text_threshold: 0.10  # < 10% text coverage → scanned PDF

paths:
  watch_dirs:
    - path: "~/Documents/DocFlow"
      recursive: false
    - path: "~/MyNotes/HughLin"
      recursive: true
      extensions: [".md"]
  supported_extensions: [".pdf", ".md", ".markdown", ".txt", ".docx"]
  db_path: "~/Projects/docflow/docflow.db"
  id_counter: "~/Projects/docflow/qdrant_id_counter.txt"

vlm:
  enabled: true
  model: "mlx-community/Qwen2.5-VL-7B-Instruct-4bit"  # ~4GB，按需加载（首次 ingest 图片时）
  prompt: "请用中文详细描述这张图片的内容，包括文字、图表、场景、颜色等所有可见信息。如图片含表格或数据，请列出关键数据。输出纯文字，不要 Markdown。"
  max_tokens: 512

llm:
  backend: "mlx"                              # local | mlx | claude
  mlx_model: "mlx-community/Qwen3-4B-4bit"   # 2.3GB, 默认
  mlx_model_enhanced: "mlx-community/Qwen3-8B-4bit"  # 4.6GB, 增强
  ollama_model: "qwen2.5:7b"                  # fallback（backend: local）
  ollama_model_enhanced: "qwen3:8b"
